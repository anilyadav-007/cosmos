<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart — CosmosVerse</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#040209;--hot-pink:#ff2d8a;--lime:#b8ff2e;--orange:#ff6b1a;--violet:#8b2fff;--cyan:#00f5ff;--yellow:#ffe135;--green:#00ff9d;--text:#f0ecff;--muted:#9d94c4;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;cursor:none;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");z-index:9999;pointer-events:none;opacity:.35;}
.blob{position:fixed;border-radius:50%;filter:blur(100px);opacity:.12;pointer-events:none;z-index:0;}
.b1{width:500px;height:500px;background:radial-gradient(circle,var(--violet),var(--hot-pink));top:-100px;right:-100px;}
.b2{width:400px;height:400px;background:radial-gradient(circle,var(--cyan),var(--lime));bottom:-50px;left:-50px;}
.cur{position:fixed;width:14px;height:14px;border-radius:50%;background:var(--hot-pink);pointer-events:none;z-index:10000;transform:translate(-50%,-50%);mix-blend-mode:screen;}
.cur-ring{position:fixed;width:38px;height:38px;border:1.5px solid rgba(0,245,255,.5);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:all .12s;}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:70px;padding:0 2.5rem;display:flex;align-items:center;justify-content:space-between;background:rgba(4,2,9,.75);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);}
.logo{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;text-decoration:none;background:linear-gradient(90deg,var(--hot-pink),var(--cyan),var(--lime));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200%;animation:gs 4s linear infinite;}
@keyframes gs{0%{background-position:0%}100%{background-position:200%}}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{color:var(--muted);text-decoration:none;font-size:.9rem;transition:color .3s;}
.nav-links a:hover{color:var(--hot-pink);}
.cart-pill{display:flex;align-items:center;gap:.5rem;background:rgba(255,45,138,.1);border:1px solid rgba(255,45,138,.3);color:var(--hot-pink);padding:.5rem 1.2rem;border-radius:30px;text-decoration:none;font-size:.85rem;transition:all .3s;}
.cart-bubble{background:var(--lime);color:#040209;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;}

.page-hero{position:relative;z-index:1;padding:110px 2rem 40px;text-align:center;}
.page-hero h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,4rem);font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--violet),var(--hot-pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.cart-layout{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 2rem 5rem;display:grid;grid-template-columns:1fr 380px;gap:2rem;}

/* CART ITEMS */
.cart-items{display:flex;flex-direction:column;gap:1rem;}
.empty-cart{text-align:center;padding:5rem 2rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:20px;}
.empty-cart .big{font-size:5rem;margin-bottom:1rem;}
.empty-cart h2{font-family:'Syne',sans-serif;font-size:1.5rem;color:#fff;margin-bottom:.5rem;}
.empty-cart p{color:var(--muted);margin-bottom:1.5rem;}
.shop-now{background:linear-gradient(135deg,var(--hot-pink),var(--violet));color:#fff;padding:.8rem 2rem;border-radius:30px;text-decoration:none;font-weight:600;font-size:.95rem;display:inline-block;transition:all .3s;}
.shop-now:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(255,45,138,.4);}

.cart-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:1.3rem;display:flex;gap:1.2rem;align-items:center;transition:border-color .3s;}
.cart-item:hover{border-color:rgba(255,45,138,.2);}
.item-emoji{width:70px;height:70px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;flex-shrink:0;}
.item-info{flex:1;}
.item-name{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:#fff;margin-bottom:.3rem;}
.item-cat{font-size:.75rem;font-family:'Fira Code',monospace;color:var(--muted);}
.item-price{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--lime);}
.item-controls{display:flex;align-items:center;gap:.7rem;}
.qty-btn{width:30px;height:30px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:var(--text);cursor:pointer;font-size:1rem;transition:all .3s;}
.qty-btn:hover{background:rgba(255,45,138,.2);border-color:var(--hot-pink);}
.qty-num{font-family:'Fira Code',monospace;font-size:.9rem;min-width:20px;text-align:center;}
.remove-btn{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.2);color:#ff4d6d;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:.8rem;transition:all .3s;}
.remove-btn:hover{background:rgba(255,77,109,.3);}

/* SUMMARY */
.summary-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:2rem;height:fit-content;position:sticky;top:90px;}
.summary-box h2{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:#fff;margin-bottom:1.5rem;}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:.7rem 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.9rem;}
.sum-row:last-of-type{border-bottom:none;}
.sum-row.total{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;padding-top:1rem;margin-top:.5rem;border-top:1px solid rgba(255,255,255,.12);}
.sum-label{color:var(--muted);}
.sum-val{color:var(--text);font-family:'Fira Code',monospace;}
.sum-val.green{color:var(--green);}
.sum-val.pink{color:var(--hot-pink);}

.coupon-row{display:flex;gap:.5rem;margin:1.2rem 0;}
.coupon-input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--text);padding:.65rem 1rem;font-family:'Fira Code',monospace;font-size:.8rem;outline:none;}
.coupon-input:focus{border-color:var(--cyan);}
.coupon-btn{background:rgba(0,245,255,.1);border:1px solid rgba(0,245,255,.3);color:var(--cyan);padding:.65rem 1rem;border-radius:10px;cursor:pointer;font-size:.8rem;font-family:'Syne',sans-serif;transition:all .3s;}
.coupon-btn:hover{background:rgba(0,245,255,.2);}
.coupon-hint{font-size:.72rem;color:var(--muted);font-family:'Fira Code',monospace;margin-bottom:1rem;}

.checkout-btn{width:100%;padding:1.1rem;background:linear-gradient(135deg,var(--hot-pink),var(--violet));border:none;border-radius:14px;color:#fff;font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;letter-spacing:.05em;transition:all .3s;box-shadow:0 0 30px rgba(255,45,138,.2);}
.checkout-btn:hover{transform:translateY(-2px);box-shadow:0 0 50px rgba(255,45,138,.4);}
.continue-link{display:block;text-align:center;color:var(--muted);font-size:.85rem;text-decoration:none;margin-top:1rem;transition:color .3s;}
.continue-link:hover{color:var(--cyan);}

.toast{position:fixed;bottom:2rem;right:2rem;z-index:5000;background:rgba(8,3,20,.95);border:1px solid rgba(255,45,138,.4);backdrop-filter:blur(20px);border-radius:16px;padding:1rem 1.5rem;color:var(--text);font-size:.9rem;transform:translateY(100px);opacity:0;transition:all .4s;}
.toast.show{transform:translateY(0);opacity:1;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:linear-gradient(var(--hot-pink),var(--violet));border-radius:3px;}
@media(max-width:900px){.cart-layout{grid-template-columns:1fr;}.summary-box{position:relative;top:0;}.nav-links{display:none;}}
</style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div>
<div class="cur" id="cur"></div><div class="cur-ring" id="curRing"></div>
<nav>
  <a href="index.html" class="logo">✦ CosmosVerse</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li><li><a href="shop.html">Shop</a></li><li><a href="categories.html">Categories</a></li><li><a href="gallery.html">Gallery</a></li><li><a href="learn.html">Learn</a></li><li><a href="search.html">Search</a></li><li><a href="contact.html">Contact</a></li>
  </ul>
  <a href="cart.html" class="cart-pill">🛒 Cart <span class="cart-bubble" id="cartCount">0</span></a>
</nav>

<div class="page-hero">
  <h1>🛒 Your Cart</h1>
</div>

<div class="cart-layout">
  <div class="cart-items" id="cartItems"></div>

  <aside class="summary-box">
    <h2>Order Summary</h2>
    <div class="sum-row"><span class="sum-label">Subtotal</span><span class="sum-val" id="subtotal">₹0</span></div>
    <div class="sum-row"><span class="sum-label">Shipping</span><span class="sum-val green" id="shipping">FREE</span></div>
    <div class="sum-row"><span class="sum-label">Tax (GST 18%)</span><span class="sum-val" id="gst">₹0</span></div>
    <div class="sum-row"><span class="sum-label">Discount</span><span class="sum-val pink" id="discount">-₹0</span></div>
    <div class="coupon-row">
      <input type="text" class="coupon-input" id="couponInput" placeholder="COUPON CODE">
      <button class="coupon-btn" onclick="applyCoupon()">Apply</button>
    </div>
    <div class="coupon-hint">Try: COSMOS20 (20% off) or STAR10 (10% off)</div>
    <div class="sum-row total"><span>Total</span><span class="sum-val" id="total" style="color:var(--lime);">₹0</span></div>
    <button class="checkout-btn" onclick="location.href='checkout.html'">🚀 Proceed to Checkout</button>
    <a href="shop.html" class="continue-link">← Continue Shopping</a>
  </aside>
</div>
<div class="toast" id="toast"></div>

<script>
const cur=document.getElementById('cur'),ring=document.getElementById('curRing');
document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';ring.style.left=e.clientX+'px';ring.style.top=e.clientY+'px';});

let discount=0;
const colors=['255,45,138','0,245,255','184,255,46','139,47,255','255,107,26','0,255,157','255,225,53'];

function getCart(){return JSON.parse(localStorage.getItem('cosmosCart')||'[]');}
function saveCart(c){localStorage.setItem('cosmosCart',JSON.stringify(c));}

function renderCart(){
  const c=getCart();
  const el=document.getElementById('cartItems');
  if(!c.length){
    el.innerHTML=`<div class="empty-cart"><div class="big">🛸</div><h2>Your cart is empty!</h2><p>The universe is waiting to be explored.</p><a href="shop.html" class="shop-now">🚀 Start Exploring</a></div>`;
    updateSummary();return;
  }
  el.innerHTML=c.map((item,i)=>{
    const col=colors[i%colors.length];
    return`<div class="cart-item">
      <div class="item-emoji" style="background:rgba(${col},.15)">${item.emoji||'🌌'}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-cat">SKU: CV-${item.id.toString().padStart(4,'0')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
        <div class="item-controls">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
        </div>
        <div class="item-price">₹${(item.price*item.qty).toLocaleString()}</div>
        <button class="remove-btn" onclick="removeItem(${item.id})" title="Remove">✕</button>
      </div>
    </div>`;}).join('');
  updateSummary();
  document.getElementById('cartCount').textContent=c.reduce((a,i)=>a+i.qty,0);
}

function changeQty(id,d){
  let c=getCart();const i=c.findIndex(x=>x.id===id);
  if(i>-1){c[i].qty+=d;if(c[i].qty<=0)c.splice(i,1);}
  saveCart(c);renderCart();
}
function removeItem(id){
  let c=getCart();saveCart(c.filter(x=>x.id!==id));renderCart();showToast('🗑️ Item removed');
}
function updateSummary(){
  const c=getCart();
  const sub=c.reduce((a,i)=>a+i.price*i.qty,0);
  const disc=Math.round(sub*discount);
  const gst=Math.round((sub-disc)*.18);
  const total=sub-disc+gst;
  document.getElementById('subtotal').textContent='₹'+sub.toLocaleString();
  document.getElementById('gst').textContent='₹'+gst.toLocaleString();
  document.getElementById('discount').textContent='-₹'+disc.toLocaleString();
  document.getElementById('total').textContent='₹'+total.toLocaleString();
}
function applyCoupon(){
  const code=document.getElementById('couponInput').value.trim().toUpperCase();
  if(code==='COSMOS20'){discount=.2;showToast('🎉 20% discount applied!');updateSummary();}
  else if(code==='STAR10'){discount=.1;showToast('✨ 10% discount applied!');updateSummary();}
  else showToast('❌ Invalid coupon code');
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
renderCart();
</script>
</body>
</html>
